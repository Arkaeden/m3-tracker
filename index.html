<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVV AI • M3/M4 ALLOCATION TRACKER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Grotesk:wght@400;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        /* ============================================================
           REVV AI — SEKIGUCHI AUTOMOTIVE PERFORMANCE SYSTEM
           ============================================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent:       #10FF80;
            --accent-glow:  rgba(16, 255, 128, 0.25);
            --black:        #000000;
            --srf:          #050505;
            --srf-1:        #0A0A0A;
            --srf-2:        #121212;
            --white:        #FFFFFF;
            --gray-text:    #A0A0A0;
            --gray-dim:     #555555;
            --border:       #222222;
            --border-focus: #333333;
            --trans:        0.3s cubic-bezier(0.16, 1, 0.3, 1);
            --trans-slow:   0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        html, body {
            background: var(--srf);
            color: var(--white);
            overflow-x: hidden;
            min-height: 100vh;
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .master-wrapper { display: flex; justify-content: center; min-height: 100vh; position: relative; width: 100vw; }
        
        .center-stage {
            display: flex; flex-direction: column; width: 100%; max-width: 1200px;
            position: relative; min-height: 100vh; padding: 40px 24px; z-index: 10;
        }

        /* HEADER GRID */
        .pane-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr; 
            align-items: center;
            width: 100%;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
            gap: 20px;
        }

        .header-brand { justify-self: start; display: flex; flex-direction: column; gap: 4px; }
        .logo-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px; }
        .logo-title span { color: var(--accent); font-family: 'Space Mono', monospace; font-size: 12px; }
        .header-subtitle { font-size: 9px; color: var(--gray-dim); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }

        .header-metrics {
            justify-self: center;
            display: flex;
            align-items: center;
            gap: 24px;
            background: var(--srf-1);
            border: 1px solid var(--border);
            padding: 10px 24px;
            border-radius: 2px;
        }
        .counter-block { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--gray-dim); display: flex; align-items: center; gap: 10px; }
        .counter-block span { color: var(--white); font-weight: 700; font-size: 13px; }
        .metrics-divider { width: 1px; height: 12px; background: var(--border); }

        .header-status { justify-self: end; text-align: right; font-size: 10px; color: var(--gray-dim); letter-spacing: 0.1em; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .status-dot { display: inline-block; width: 6px; height: 6px; background: var(--accent); margin-left: 8px; box-shadow: 0 0 8px var(--accent); animation: blink 2s infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        @media (max-width: 1024px) {
            .pane-header { gap: 12px; }
            .header-subtitle { display: none; } 
        }
        @media (max-width: 768px) {
            .pane-header { grid-template-columns: 1fr; justify-items: center; text-align: center; gap: 24px; padding-bottom: 24px; }
            .header-brand, .header-metrics, .header-status { justify-self: center; text-align: center; align-items: center; }
            .header-status { flex-direction: row; gap: 16px; margin-top: 8px; }
        }

        /* ============================================================
           INTERACTIVE MAP HERO 
           ============================================================ */
        #telemetry-map {
            width: 100%;
            height: 280px;
            background: var(--srf-1);
            border: 1px solid var(--border);
            margin-bottom: 40px;
            z-index: 1; /* Keep below modal layers if any */
        }
        
        /* Custom UI Pins on the Map */
        .dealer-pin {
            background: var(--srf);
            border: 1px solid var(--accent);
            color: var(--white);
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            padding: 4px 8px;
            white-space: nowrap;
            box-shadow: 0 0 10px rgba(16, 255, 128, 0.1);
            position: relative;
            transform: translate(-50%, -50%);
        }
        .dealer-pin span { color: var(--accent); font-weight: bold; margin-left: 4px; }
        
        /* Override Leaflet Defaults to match UI */
        .leaflet-container { background: var(--srf-1); font-family: inherit; }
        .leaflet-control-attribution { display: none; } /* Clean presentation */
        .leaflet-bar a { background-color: var(--srf-2) !important; color: var(--white) !important; border-bottom: 1px solid var(--border) !important; }
        .leaflet-bar { border: 1px solid var(--border) !important; }

        /* GALLERY GRID */
        .alternates-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-bottom: 48px; }
        .alt-card { background: var(--srf-1); border: 1px solid var(--border); display: flex; flex-direction: column; position: relative; transition: border-color var(--trans); }
        .alt-card:hover { border-color: var(--border-focus); }
        .alt-img-box { height: 220px; overflow: hidden; position: relative; background: var(--srf-2); }
        .alt-img-box img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(15%) contrast(1.1); transition: transform var(--trans-slow); }
        .alt-card:hover .alt-img-box img { transform: scale(1.03); }
        .alt-details { padding: 20px; display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1; }
        .match-badge { background: var(--accent); color: var(--black); font-family: 'Space Grotesk', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; padding: 4px 8px; display: inline-block; position: absolute; top: 12px; left: 12px; z-index: 10; text-transform: uppercase; }
        .alt-title { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; color: var(--white); line-height: 1.1; margin-bottom: 4px; }
        .match-price { font-size: 14px; color: var(--accent); font-family: 'Space Mono', monospace; }
        .telemetry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin: 20px 0; font-size: 10px; color: var(--gray-dim); text-transform: uppercase; letter-spacing: 0.05em; }
        .telemetry-grid span { color: var(--white); }
        .btn-ghost { background: transparent; color: var(--white); border: 1px solid var(--border); padding: 0 24px; height: 40px; font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all var(--trans); text-decoration: none; width: 100%; }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

        .reg-mark { position: absolute; width: 8px; height: 8px; pointer-events: none; z-index: 9999; border: 1px solid var(--accent); opacity: 0.3; }
        .reg-mark.top-left { top: 24px; left: 24px; border-right: 0; border-bottom: 0; }
        .reg-mark.top-right { top: 24px; right: 24px; border-left: 0; border-bottom: 0; }
        .reg-mark.bottom-left { bottom: 24px; left: 24px; border-right: 0; border-top: 0; }
        .reg-mark.bottom-right { bottom: 24px; right: 24px; border-left: 0; border-top: 0; }
    </style>
</head>
<body>

<div class="master-wrapper">
    <div class="reg-mark top-left"></div>
    <div class="reg-mark top-right"></div>
    <div class="reg-mark bottom-left"></div>
    <div class="reg-mark bottom-right"></div>

    <div class="center-stage">
        <header class="pane-header">
            <div class="header-brand">
                <div class="logo-title">REVV <span>[AI]</span></div>
                <div class="header-subtitle">ALLOCATION TRACKER // BAY AREA</div>
            </div>
            
            <div class="header-metrics">
                <div class="counter-block">M3.TOTAL // <span id="m3-count">00</span></div>
                <div class="metrics-divider"></div>
                <div class="counter-block">M4.TOTAL // <span id="m4-count">00</span></div>
            </div>
            
            <div class="header-status">
                <div id="last-updated">SYS.UPDATE: PENDING</div>
                <div style="color:var(--white);">LIVE SCAN <span class="status-dot"></span></div>
            </div>
        </header>

        <div id="telemetry-map"></div>

        <main class="alternates-grid" id="gallery">
            <div style="grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; color: var(--gray-text); font-size: 11px; letter-spacing: 0.05em;">
                <span style="color: var(--accent);">></span> INITIALIZING ALLOCATION PROTOCOL...
            </div>
        </main>

        <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:24px;margin-top:auto;">
            <span style="font-size:9px;color:var(--gray-dim);letter-spacing:0.1em;">MATMEJIA.COM VIBE LAB</span>
            <span style="font-size:9px;color:var(--accent); font-family: sans-serif;">利用可能 // PREMIUM EXPERIENCE</span>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
    // PRE-DEFINED SPATIAL COORDINATES FOR BAY AREA SQUADRON
    const dealerCoordinates = {
        "East Bay BMW": [37.6997, -121.8766],
        "Weatherford BMW": [37.8503, -122.2945],
        "Stevens Creek BMW": [37.3241, -121.9779],
        "BMW of Mountain View": [37.3806, -122.0715],
        "Peter Pan BMW": [37.5431, -122.3031],
        "BMW of Fremont": [37.4988, -121.9753],
        "BMW Concord": [37.9751, -122.0444],
        "BMW of San Francisco": [37.7706, -122.4168]
    };

    const fallbackImage = "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_fallback.png";
    const assetLibrary = {
        "M3": {
            "alpine white": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_alpine_white.png",
            "sao paulo": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_yellow.png",
            "black sapphire": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_black.png",
            "portimao blue": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_port_blue.png",
            "brooklyn": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_brooklyn_grey.png",
            "C4P": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_brooklyn_grey.png",
            "skyscraper": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_skyscraper_grey.png",
            "C4W": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_skyscraper_grey.png",
            "isle of man": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_isle_green.png",
            "toronto red": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_toronto_red.png",
            "aventurin": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_aventurin_red.png",
            "tanzanite": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_tanzanite_blue.png",
            "dravit": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_dravit_grey.png",
            "frozen brilliant": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_frozen_white.png",
            "frozen portimao": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_frozen_blue.png",
            "frozen pure": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_frozen_grey.png",
            "frozen": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M_frozen_white.png"
        },
        "M4": {
            "alpine white": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_alpine_white.png",
            "sao paulo": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_yellow.png",
            "black sapphire": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_black.png",
            "portimao blue": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_port_blue.png",
            "brooklyn": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_brooklyn_grey.png",
            "C4P": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_brooklyn_grey.png",
            "skyscraper": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_skyscraper_grey.png",
            "C4W": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_skyscraper_grey.png",
            "isle of man": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_isle_green.png",
            "toronto red": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_toronto_red.png",
            "aventurin": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_aventurin_red.png",
            "tanzanite": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_tanzanite_blue.png",
            "dravit": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_dravit_grey.png",
            "frozen brilliant": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_frozen_white.png",
            "frozen portimao": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_frozen_blue.png",
            "frozen pure": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_frozen_grey.png",
            "frozen": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_frozen_white.png",
            "special order": "https://matmejia.com/vibe-lab/Revv/Tracker/assets/M4_frozen_blue.png"
        }
    };

    fetch('data.json?t=' + new Date().getTime())
        .then(response => response.json())
        .then(data => {
            document.getElementById('last-updated').innerText = `SYS.UPDATE: ${data.timestamp}`;
            const gallery = document.getElementById('gallery');
            
            // MAP INITIALIZATION
            const map = L.map('telemetry-map', {
                center: [37.60, -122.05], // Center of the Bay Area
                zoom: 9,
                zoomControl: false,
                scrollWheelZoom: false
            });

            // CARTO DB DARK MATTER LAYER - High contrast, minimal, 0 cost
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            if (data.vehicles.length === 0) {
                gallery.innerHTML = '<div style="grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; color: var(--gray-dim);"><span style="color: #FF2200;">></span> 0 ALLOCATIONS DETECTED.</div>';
                return;
            }
            gallery.innerHTML = ''; 

            let m3Count = 0;
            let m4Count = 0;
            let dealerInventoryCount = {}; // Object to track cars per dealership

            data.vehicles.forEach(car => {
                let safeImageUrl = fallbackImage; 
                const dealerColor = car.color.toLowerCase();
                const modelKey = car.model.includes('M4') ? 'M4' : 'M3';
                const currentLibrary = assetLibrary[modelKey];

                if (modelKey === 'M4') m4Count++; else m3Count++;
                
                // Track total allocation count for the map pin per dealer
                if (dealerInventoryCount[car.dealer]) {
                    dealerInventoryCount[car.dealer]++;
                } else {
                    dealerInventoryCount[car.dealer] = 1;
                }

                const sortedKeywords = Object.keys(currentLibrary).sort((a, b) => b.length - a.length);
                for (const keyword of sortedKeywords) {
                    if (dealerColor.includes(keyword) || (keyword.includes('grey') && dealerColor.includes(keyword.replace('grey', 'gray')))) {
                        safeImageUrl = currentLibrary[keyword];
                        break; 
                    }
                }

                const cleanPrice = car.price.replace(/\$/g, '');
                const displayPrice = cleanPrice === "Call" ? "Call" : `$${cleanPrice}`;

                gallery.innerHTML += `
                    <div class="alt-card">
                        <div class="alt-img-box">
                            ${car.is_new ? '<div class="match-badge">NEW ALLOCATION</div>' : ''}
                            <img src="${safeImageUrl}" onerror="this.onerror=null; this.src='${fallbackImage}';" alt="${car.model}">
                        </div>
                        <div class="alt-details">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 8px;">
                                <div class="alt-title">${car.year} ${car.model}</div>
                                <div class="match-price">${displayPrice}</div>
                            </div>
                            <div class="telemetry-grid">
                                <div>ID <span>${car.vin.slice(-6)}</span></div>
                                <div>CLR <span>${car.color}</span></div>
                                <div>LOC <span>${car.dealer}</span></div>
                                <div>STS <span>${car.status}</span></div>
                            </div>
                            <a href="${car.link}" target="_blank" class="btn-ghost">INITIALIZE LINK [→]</a>
                        </div>
                    </div>
                `;
            });

            document.getElementById('m3-count').innerText = m3Count.toString().padStart(2, '0');
            document.getElementById('m4-count').innerText = m4Count.toString().padStart(2, '0');

            // POPULATE MAP WITH DYNAMIC DEALER PINS
            for (const [dealerName, coords] of Object.entries(dealerCoordinates)) {
                const stockCount = dealerInventoryCount[dealerName] || 0; // Show 0 if out of stock
                
                // Create custom HTML pin styling
                const customIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class="dealer-pin">${dealerName.replace('BMW', '').replace('of ', '').trim()} <span>${stockCount}</span></div>`,
                    iconSize: [0, 0],
                    iconAnchor: [0, 0]
                });

                L.marker(coords, {icon: customIcon}).addTo(map);
            }
        })
        .catch(error => {
            document.getElementById('gallery').innerHTML = '<div style="grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; color: var(--gray-dim);"><span style="color: #FF2200;">></span> CONNECTION OFFLINE.</div>';
        });
</script>
</body>
</html>
