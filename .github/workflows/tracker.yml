name: M3 Engine Restart

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install requests cloudscraper

      - name: Run Scraper Engine
        run: python scraper.py

      - name: Save New Data to Gallery
        run: |
          git config --global user.name 'M3 Scraper Bot'
          git config --global user.email 'bot@m3tracker.local'
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated inventory update"
            git push
          fi
