name: Update M3 Inventory

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours automatically
  workflow_dispatch: # Gives you a button to trigger it manually anytime

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install requests

      - name: Run Scraper Engine
        run: python scraper.py

      - name: Save New Data to Gallery
        run: |
          git config --global user.name 'M3 Scraper Bot'
          git config --global user.email 'bot@m3tracker.local'
          git add data.json
          git commit -m "Automated inventory update" || exit 0
          git push
