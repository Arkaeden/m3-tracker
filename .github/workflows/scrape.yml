name: Update M3 Inventory

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: 

jobs:
  scrape:
    runs-on: ubuntu-latest
    # This section gives the robot explicit permission to save files
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated to Node 24 version

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to Node 24 version
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install requests

      - name: Run Scraper Engine
        run: python scraper.py

      - name: Save New Data to Gallery
        run: |
          git config --global user.name 'M3 Scraper Bot'
          git config --global user.email 'bot@m3tracker.local'
          git add data.json
          # This "if" part makes sure the robot doesn't crash if no new cars were found
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automated inventory update"
            git push
          fi
